name: Ecosystem Link Check

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
  push:
    paths:
      - 'ecosystem/LINK-REGISTRY.md'

jobs:
  check-all-ecosystem-urls:
    name: Check all ecosystem canonical URLs
    runs-on: ubuntu-latest
    steps:
      - name: Verify ecosystem URLs
        run: |
          failed=0
          check() {
            local label="$1"
            local url="$2"
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 -L "$url")
            if [[ "$status" -ge 200 && "$status" -lt 400 ]]; then
              echo "OK [$status]: $label"
            else
              echo "::error::FAIL [$status]: $label — $url"
              failed=1
            fi
          }

          check "velocity-architecture"       "https://velocityarchitectureframework.com/"
          check "velocity-academy"            "https://velocityarchitecture.com.au/"
          check "zencloud-advisory"           "https://www.zencloud.com.au/"
          check "studiosix"                   "https://studiosix.com.au/"
          check "ea-artefact-generator"       "https://ea.velocityarchitecture.com.au/"
          check "vaf-sa"                      "https://zencloudau.github.io/vaf-sa/"
          check "vsf-match"                   "https://zencloudau.github.io/vsf-match/"
          check "vaf-python-zero-to-hero"     "https://zencloudau.github.io/vaf-python-zero-to-hero/"
          check "vaf-typescript-zero-to-hero" "https://zencloudau.github.io/vaf-typescript-zero-to-hero/"
          check "AzureSACertification"        "https://zencloudau.github.io/AzureSACertification/"
          check "SAPEACertification"          "https://zencloudau.github.io/SAPEACertification/"
          check "CISSPCertification"          "https://zencloudau.github.io/CISSPCertification/"
          check "learn-with-claude"           "https://zencloudau.github.io/learn-with-claude/"
          check "trading-dashboard"           "https://zencloudau.github.io/trading-dashboard/"
          check "pmi-portal"                  "https://zencloudau.github.io/pmi-portal/"

          exit $failed
