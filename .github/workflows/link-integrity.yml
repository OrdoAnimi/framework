name: Public Site Route Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'
  push:
    branches:
      - main
    paths:
      - '**/*.html'
      - '**/*.md'
      - 'CNAME'
      - '_config.yml'
      - 'robots.txt'
      - 'sitemap.xml'

jobs:
  check-public-routes:
    runs-on: ubuntu-latest
    steps:
      - name: Verify public knowledge-base routes
        shell: bash
        run: |
          set -euo pipefail
          base='https://velocityarchitectureframework.com'
          routes=(
            '/'
            '/site-map.html'
            '/foundation/'
            '/spec/'
            '/viewpoints/'
            '/correspondence-rules/'
            '/frameworks/'
            '/guides/'
            '/diagnostics/'
            '/templates/'
            '/examples/'
            '/policies/'
            '/research/'
            '/publications/'
            '/publications/thought-series/'
            '/publications/signal/'
            '/publications/book/'
          )

          failed=0
          for route in "${routes[@]}"; do
            url="${base}${route}"
            status=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 30 -L "$url" || true)
            if [[ "$status" -ge 200 && "$status" -lt 400 ]]; then
              echo "OK [$status] $url"
            else
              echo "::error::FAIL [$status] $url"
              failed=1
            fi
          done

          exit "$failed"
