name: Link Integrity (reusable)

on:
  workflow_call:
    inputs:
      site_url:
        required: true
        type: string
        description: 'Canonical URL to verify returns a successful HTTP response'
      repo_name:
        required: false
        type: string
        description: 'Human-readable repo name for log output'

jobs:
  check-url:
    name: Verify ${{ inputs.repo_name || inputs.site_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check canonical URL
        run: |
          URL="${{ inputs.site_url }}"
          LABEL="${{ inputs.repo_name || inputs.site_url }}"
          echo "Checking: $URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 -L "$URL")
          echo "HTTP status: $STATUS"
          if [[ "$STATUS" -ge 200 && "$STATUS" -lt 400 ]]; then
            echo "OK [$STATUS]: $LABEL"
          else
            echo "::error::FAIL [$STATUS]: $LABEL — $URL"
            exit 1
          fi
