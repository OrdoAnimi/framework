name: Publish New Articles

on:
  push:
    branches: [main]
    paths:
      - 'research/**/*.md'
      - 'publications/**/*.md'

# Rapid CMS saves queue multiple runs; only the newest matters because the
# generator rebuilds every page from the newest SHA each run.
concurrency:
  group: publish-articles
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tools/tests/ -v

      - name: Sync nav and footer
        run: python tools/sync_nav.py

      - name: Nav lint (no stale anchors)
        run: |
          if grep -r '#why-vaf\|#repository' --include="*.html" . 2>/dev/null | grep -v "SHARED-NAV"; then
            echo "FAIL: stale anchor links found"
            exit 1
          fi
          echo "Nav lint: OK"

      - name: Generate reader pages
        run: |
          echo "=== MD files in research/ ==="
          ls research/*.md 2>/dev/null || echo "(none)"
          echo "=== MD files in publications/ ==="
          ls publications/*.md 2>/dev/null || echo "(none)"
          python tools/generate_pages.py

      - name: Commit generated pages
        run: |
          git config user.name "velocity-publisher[bot]"
          git config user.email "velocity-publisher[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new pages generated."
          else
            git commit -m "chore: auto-generate reader pages for new articles"
            # a CMS save can land on main mid-run; rebase (md-only user commits
            # never conflict with html-only bot commits) and retry
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main
            done
          fi

      - name: Request Pages build
        # Pushes made with GITHUB_TOKEN do not reliably trigger a Pages build,
        # so ask for one explicitly; idempotent when nothing changed.
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"
