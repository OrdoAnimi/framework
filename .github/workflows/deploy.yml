name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zencloudau/velocity-architecture
  RESOURCE_GROUP: vaf-rg
  CONTAINER_NAME: vaf-agentic-architect
  LOCATION: australiasoutheast

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete existing container (required to update ports)
        run: |
          az container delete \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --yes 2>/dev/null || true

      - name: Deploy to Azure Container Instances
        run: |
          az container create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --registry-server ${{ env.REGISTRY }} \
            --registry-username ${{ github.actor }} \
            --registry-password ${{ secrets.GH_TOKEN }} \
            --ports 80 3000 \
            --ip-address Public \
            --location ${{ env.LOCATION }} \
            --os-type Linux \
            --cpu 1 \
            --memory 1.5 \
            --environment-variables \
                ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
                GH_TOKEN=${{ secrets.GH_TOKEN }} \
                NODE_ENV=production \
            --restart-policy Always

      - name: Show container IP
        run: |
          az container show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --query ipAddress.ip \
            --output tsv
