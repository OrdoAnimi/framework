name: VAF Agentic Architect — Build & Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/velocity-architecture:latest" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

  deploy:
    name: Deploy to Azure Container Instances
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_PAT: ${{ secrets.GH_TOKEN }}
      ACTOR: ${{ github.actor }}

    steps:
      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/velocity-architecture:latest" >> $GITHUB_ENV

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name vaf-rg \
            --location australiasoutheast

      - name: Deploy to Azure Container Instances
        run: |
          az container create \
            --resource-group vaf-rg \
            --name vaf-agentic-architect \
            --image "$IMAGE" \
            --os-type Linux \
            --cpu 1 \
            --memory 1 \
            --ports 3000 \
            --ip-address Public \
            --location australiasoutheast \
            --restart-policy Always \
            --registry-login-server ghcr.io \
            --registry-username "$ACTOR" \
            --registry-password "$GH_PAT" \
            --environment-variables NODE_ENV=production GITHUB_OWNER=ZenCloudAU GITHUB_REPO=velocity-architecture \
            --secure-environment-variables "ANTHROPIC_API_KEY=$ANTHROPIC_KEY" "VAF_GITHUB_TOKEN=$GH_PAT"

      - name: Get container IP and verify
        run: |
          sleep 20
          IP=$(az container show \
            --resource-group vaf-rg \
            --name vaf-agentic-architect \
            --query ipAddress.ip \
            --output tsv)
          echo "VAF Agent live at: http://$IP:3000"
          curl -f "http://$IP:3000/health" && echo "Health check passed"
